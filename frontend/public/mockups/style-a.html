<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Style A — Bold ink-stroke / pastel tiles</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background:#f7f5ee; }
  .ink { border: 2px solid #0f172a; box-shadow: 4px 4px 0 0 #0f172a; }
  .ink-sm { border: 2px solid #0f172a; box-shadow: 2px 2px 0 0 #0f172a; }
  .phone { width: 390px; height: 844px; border-radius: 44px; overflow: hidden; box-shadow: 0 30px 60px rgba(15,23,42,.25), 0 0 0 10px #0f172a, 0 0 0 12px #1e293b; }
  .heat { width: 14px; height: 14px; border-radius: 3px; }
  .pop { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  .marker { background: linear-gradient(180deg, transparent 60%, #c8f5d1 60%); padding: 0 6px; }
  .pill { border: 2px solid #0f172a; }
  .tab-active { background: #0f172a; color: #fff; }
  .orb-shadow { box-shadow: 0 12px 28px rgba(16,185,129,.45), 0 0 0 4px #0f172a; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center py-10">
  <div class="phone bg-[#f7f5ee] relative">
    <!-- status bar -->
    <div class="flex justify-between items-center px-7 pt-3 pb-1 text-[12px] font-semibold text-slate-900">
      <span>9:41</span>
      <span class="flex items-center gap-1">
        <span class="w-4 h-2 bg-slate-900 rounded-sm"></span>
        <span class="w-3 h-3 border-2 border-slate-900 rounded-full"></span>
        <span class="w-6 h-3 border-2 border-slate-900 rounded-sm"></span>
      </span>
    </div>

    <!-- top app bar -->
    <div class="px-4 pt-2 pb-3 flex items-center justify-between">
      <button class="w-10 h-10 ink rounded-2xl bg-white grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="flex flex-col items-center">
        <span class="text-[10px] tracking-widest text-slate-500 font-bold">CODE · WKND42</span>
        <span class="pop text-[18px] text-slate-900">Weekend Warriors</span>
      </div>
      <button class="w-10 h-10 ink rounded-2xl bg-emerald-200 grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </button>
    </div>

    <!-- segmented tabs -->
    <div class="px-4 mb-3">
      <div class="ink rounded-full bg-white p-1 flex text-[12px] font-bold">
        <button class="flex-1 py-2 rounded-full tab-active">Sync orbits</button>
        <button class="flex-1 py-2 rounded-full text-slate-700">Crew schedule</button>
      </div>
    </div>

    <!-- scrollable content -->
    <div class="px-4 space-y-3 overflow-hidden" style="height: 540px;">
      <!-- hero stats -->
      <div class="ink rounded-2xl bg-yellow-200 p-4">
        <div class="flex items-baseline justify-between">
          <div>
            <div class="text-[10px] tracking-widest text-slate-700 font-bold">EVERYONE FREE</div>
            <div class="pop text-3xl text-slate-900">Sat 8–11pm</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] tracking-widest text-slate-700 font-bold">CREW</div>
            <div class="pop text-2xl text-slate-900">5/5</div>
          </div>
        </div>
        <div class="mt-3 flex -space-x-2">
          <div class="w-7 h-7 rounded-full ink-sm bg-pink-300 grid place-items-center text-[10px] font-bold">A</div>
          <div class="w-7 h-7 rounded-full ink-sm bg-sky-300 grid place-items-center text-[10px] font-bold">M</div>
          <div class="w-7 h-7 rounded-full ink-sm bg-emerald-300 grid place-items-center text-[10px] font-bold">J</div>
          <div class="w-7 h-7 rounded-full ink-sm bg-amber-300 grid place-items-center text-[10px] font-bold">K</div>
          <div class="w-7 h-7 rounded-full ink-sm bg-violet-300 grid place-items-center text-[10px] font-bold">+1</div>
        </div>
      </div>

      <!-- heatmap card -->
      <div class="ink rounded-2xl bg-white p-4">
        <div class="flex items-center justify-between mb-3">
          <div class="pop text-[14px] text-slate-900">This week</div>
          <span class="text-[10px] tracking-widest text-slate-500 font-bold">JUL 14 – JUL 20</span>
        </div>
        <div class="grid grid-cols-7 gap-1">
          <!-- 7 cols x 8 rows of cells -->
          <script>document.write(Array.from({length:56}).map((_,i)=>{const palette=['#f1f5f9','#dcfce7','#bbf7d0','#86efac','#4ade80','#22c55e','#16a34a','#15803d'];const c=palette[Math.floor(Math.random()*8)];return `<div class="heat" style="background:${c};border:1px solid #0f172a"></div>`}).join(''))</script>
        </div>
      </div>

      <!-- next hangout -->
      <div class="ink rounded-2xl bg-emerald-200 p-4">
        <div class="text-[10px] tracking-widest text-slate-700 font-bold">UPCOMING HANGOUT</div>
        <div class="pop text-lg text-slate-900">Pizza & Trivia 🍕</div>
        <div class="text-[12px] text-slate-700 mt-1">Saturday · 8:00–10:30pm · Brooklyn</div>
        <div class="mt-3 flex gap-2">
          <button class="pill bg-white rounded-full px-3 py-1.5 text-[11px] font-bold">Add to calendar</button>
          <button class="pill bg-white rounded-full px-3 py-1.5 text-[11px] font-bold">Share</button>
        </div>
      </div>
    </div>

    <!-- center astral mascot orb (above the tab bar) -->
    <div class="absolute left-1/2 -translate-x-1/2" style="bottom: 60px;">
      <div class="w-16 h-16 rounded-full grid place-items-center orb-shadow" style="background: linear-gradient(135deg,#a7f3d0,#86efac 60%,#34d399);">
        <!-- bot face -->
        <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
          <rect x="6" y="9" width="20" height="16" rx="5" fill="#fff" stroke="#0f172a" stroke-width="2"/>
          <line x1="16" y1="4" x2="16" y2="9" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="3" r="1.6" fill="#fde68a" stroke="#0f172a" stroke-width="1.5"/>
          <circle cx="12" cy="16" r="1.7" fill="#0f172a"/>
          <circle cx="20" cy="16" r="1.7" fill="#0f172a"/>
          <path d="M12 20 Q16 22 20 20" stroke="#0f172a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

    <!-- bottom tab bar -->
    <div class="absolute left-0 right-0 bottom-0 px-4 pb-5 pt-2">
      <div class="ink rounded-3xl bg-white p-2 grid grid-cols-5 gap-1">
        <button class="flex flex-col items-center gap-0.5 py-1.5 rounded-2xl tab-active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="text-[9px] font-bold">Plan</span>
        </button>
        <button class="flex flex-col items-center gap-0.5 py-1.5 text-slate-600">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="7" r="3"/></svg>
          <span class="text-[9px] font-bold">Crew</span>
        </button>
        <div></div>
        <button class="flex flex-col items-center gap-0.5 py-1.5 text-slate-600">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2 L2 8 L12 14 L22 8 Z"/><path d="M2 16 L12 22 L22 16"/></svg>
          <span class="text-[9px] font-bold">Hangouts</span>
        </button>
        <button class="flex flex-col items-center gap-0.5 py-1.5 text-slate-600">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
          <span class="text-[9px] font-bold">More</span>
        </button>
      </div>
    </div>

    <!-- label below orb -->
    <div class="absolute left-1/2 -translate-x-1/2 text-[9px] font-bold tracking-widest text-slate-700" style="bottom: 32px;">ASTRAL</div>
  </div>

  <div class="absolute bottom-2 text-center w-full text-slate-700 font-semibold">Style A — Bold ink-stroke / pastel tiles (current aesthetic, retuned for mobile)</div>
</body>
</html>
