<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Style B — Glassmorphic iOS-style</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: linear-gradient(135deg,#fce7f3 0%,#dbeafe 50%,#dcfce7 100%);
    min-height: 100vh;
  }
  .phone-bg {
    background-image: 
      radial-gradient(circle at 20% 10%, rgba(244,114,182,.55), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(96,165,250,.55), transparent 45%),
      radial-gradient(circle at 30% 80%, rgba(167,243,208,.6), transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(252,211,77,.4), transparent 50%),
      #f8fafc;
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 50px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(15,23,42,.3), 0 0 0 9px #1e293b, 0 0 0 11px #334155;
  }
  .glass {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.6);
  }
  .glass-strong {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.7);
  }
  .glass-dark {
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
  }
  .heat { width: 14px; height: 14px; border-radius: 4px; }
  .pop { font-family: -apple-system, 'SF Pro Display'; font-weight: 700; letter-spacing: -0.03em; }
  .orb-glow { box-shadow: 0 20px 50px rgba(99,102,241,.55), 0 0 0 8px rgba(255,255,255,.55); }
</style>
</head>
<body class="flex items-center justify-center py-10">
  <div class="phone phone-bg relative">
    <!-- status bar -->
    <div class="flex justify-between items-center px-7 pt-3 pb-2 text-[13px] font-semibold text-slate-900">
      <span>9:41</span>
      <span class="flex items-center gap-1.5">
        <span class="w-4 h-2.5 bg-slate-900 rounded-sm"></span>
        <span class="w-4 h-3 bg-slate-900 rounded-sm"></span>
        <span class="w-6 h-3 border border-slate-900 rounded-sm"></span>
      </span>
    </div>

    <!-- top app bar -->
    <div class="px-4 pt-2 pb-4 flex items-center justify-between">
      <button class="w-10 h-10 glass rounded-full grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="flex flex-col items-center">
        <span class="text-[10px] tracking-wider text-slate-500 font-medium">WKND42</span>
        <span class="pop text-[18px] text-slate-900">Weekend Warriors</span>
      </div>
      <button class="w-10 h-10 glass rounded-full grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </button>
    </div>

    <!-- segmented tabs -->
    <div class="px-4 mb-3">
      <div class="glass rounded-2xl p-1 flex text-[13px] font-semibold">
        <button class="flex-1 py-2 rounded-xl bg-white/85 text-slate-900 shadow-sm">Sync orbits</button>
        <button class="flex-1 py-2 rounded-xl text-slate-600">Crew schedule</button>
      </div>
    </div>

    <!-- scrollable content -->
    <div class="px-4 space-y-3 overflow-hidden" style="height: 540px;">
      <!-- hero stats -->
      <div class="glass-strong rounded-3xl p-5">
        <div class="flex items-baseline justify-between">
          <div>
            <div class="text-[10px] uppercase tracking-wider text-slate-500 font-medium">Everyone free</div>
            <div class="pop text-3xl text-slate-900">Sat 8–11pm</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] uppercase tracking-wider text-slate-500 font-medium">Crew</div>
            <div class="pop text-2xl text-slate-900">5<span class="text-slate-400">/5</span></div>
          </div>
        </div>
        <div class="mt-4 flex -space-x-2">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-pink-300 to-rose-400 ring-2 ring-white/80 grid place-items-center text-[11px] font-semibold text-white">A</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sky-300 to-blue-500 ring-2 ring-white/80 grid place-items-center text-[11px] font-semibold text-white">M</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-300 to-emerald-500 ring-2 ring-white/80 grid place-items-center text-[11px] font-semibold text-white">J</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-300 to-orange-400 ring-2 ring-white/80 grid place-items-center text-[11px] font-semibold text-white">K</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-300 to-purple-500 ring-2 ring-white/80 grid place-items-center text-[11px] font-semibold text-white">+1</div>
        </div>
      </div>

      <!-- heatmap card -->
      <div class="glass rounded-3xl p-5">
        <div class="flex items-center justify-between mb-3">
          <div class="pop text-[15px] text-slate-900">This week</div>
          <span class="text-[10px] uppercase tracking-wider text-slate-500">Jul 14 – Jul 20</span>
        </div>
        <div class="grid grid-cols-7 gap-1">
          <script>document.write(Array.from({length:56}).map(()=>{const palette=['rgba(241,245,249,.7)','rgba(220,252,231,.85)','rgba(187,247,208,.9)','rgba(134,239,172,.95)','rgba(74,222,128,1)','rgba(34,197,94,1)','rgba(22,163,74,1)','rgba(21,128,61,1)'];const c=palette[Math.floor(Math.random()*8)];return `<div class="heat" style="background:${c}"></div>`}).join(''))</script>
        </div>
      </div>

      <!-- next hangout -->
      <div class="rounded-3xl p-5 relative overflow-hidden" style="background: linear-gradient(135deg, rgba(167,243,208,.85), rgba(110,231,183,.7));backdrop-filter: blur(20px);border:1px solid rgba(255,255,255,.6);">
        <div class="text-[10px] uppercase tracking-wider text-slate-700 font-medium">Upcoming hangout</div>
        <div class="pop text-lg text-slate-900 mt-0.5">Pizza & Trivia 🍕</div>
        <div class="text-[12px] text-slate-700 mt-1">Saturday · 8:00–10:30pm · Brooklyn</div>
        <div class="mt-3 flex gap-2">
          <button class="glass-strong rounded-full px-3.5 py-1.5 text-[11px] font-semibold text-slate-900">Add to calendar</button>
          <button class="glass-strong rounded-full px-3.5 py-1.5 text-[11px] font-semibold text-slate-900">Share</button>
        </div>
      </div>
    </div>

    <!-- center astral mascot orb -->
    <div class="absolute left-1/2 -translate-x-1/2" style="bottom: 72px;">
      <div class="w-16 h-16 rounded-full grid place-items-center orb-glow" style="background: linear-gradient(135deg,#a78bfa,#7c3aed 60%,#4f46e5);">
        <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
          <rect x="6" y="9" width="20" height="16" rx="6" fill="rgba(255,255,255,.95)"/>
          <line x1="16" y1="4" x2="16" y2="9" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="3" r="1.8" fill="#fde68a"/>
          <circle cx="12" cy="16" r="1.8" fill="#4f46e5"/>
          <circle cx="20" cy="16" r="1.8" fill="#4f46e5"/>
          <path d="M12 20 Q16 22.5 20 20" stroke="#4f46e5" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

    <!-- bottom tab bar -->
    <div class="absolute left-0 right-0 bottom-0 px-4 pb-6 pt-2">
      <div class="glass-strong rounded-3xl py-3 grid grid-cols-5">
        <button class="flex flex-col items-center gap-0.5 text-indigo-600">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="text-[10px] font-semibold">Plan</span>
        </button>
        <button class="flex flex-col items-center gap-0.5 text-slate-500">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="7" r="3"/></svg>
          <span class="text-[10px] font-medium">Crew</span>
        </button>
        <div></div>
        <button class="flex flex-col items-center gap-0.5 text-slate-500">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2 L2 8 L12 14 L22 8 Z"/><path d="M2 16 L12 22 L22 16"/></svg>
          <span class="text-[10px] font-medium">Hangouts</span>
        </button>
        <button class="flex flex-col items-center gap-0.5 text-slate-500">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <span class="text-[10px] font-medium">More</span>
        </button>
      </div>
    </div>

    <!-- label below orb -->
    <div class="absolute left-1/2 -translate-x-1/2 text-[10px] font-medium tracking-wider text-indigo-700" style="bottom: 42px;">astral</div>
  </div>

  <div class="absolute bottom-2 text-center w-full text-slate-700 font-semibold">Style B — Glassmorphic iOS-style (frosted, layered, soft)</div>
</body>
</html>
