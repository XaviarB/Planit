<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Style C — Modern flat with vibrant gradient</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #0a0e1a; min-height: 100vh; }
  .phone {
    width: 390px; height: 844px;
    border-radius: 48px; overflow: hidden;
    background: #0a0e1a;
    box-shadow: 0 40px 80px rgba(124,58,237,.45), 0 0 0 9px #1e1b4b, 0 0 0 11px #312e81;
  }
  .gradient-text {
    background: linear-gradient(135deg, #c4b5fd, #f0abfc, #fda4af);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .pop { font-weight: 800; letter-spacing: -0.025em; }
  .glow-card {
    background: linear-gradient(135deg, rgba(99,102,241,.18), rgba(168,85,247,.18) 50%, rgba(236,72,153,.18));
    border: 1px solid rgba(168,85,247,.35);
    box-shadow: 0 0 40px rgba(168,85,247,.18), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .flat-card {
    background: #1a1d2e;
    border: 1px solid rgba(255,255,255,.06);
  }
  .heat { width: 14px; height: 14px; border-radius: 4px; }
  .orb-mega {
    background: conic-gradient(from 0deg, #a78bfa, #ec4899, #f472b6, #c4b5fd, #818cf8, #a78bfa);
    box-shadow: 0 0 50px rgba(168,85,247,.7), 0 0 0 4px rgba(255,255,255,.05);
  }
  .pulse-ring {
    border: 2px solid rgba(168,85,247,.4);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: .6; }
    80%  { transform: scale(1.45); opacity: 0; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  .accent-grad { background: linear-gradient(135deg,#a78bfa,#ec4899); }
  .tab-active-grad {
    background: linear-gradient(135deg, rgba(167,139,250,.25), rgba(236,72,153,.25));
    border: 1px solid rgba(168,85,247,.45);
  }
</style>
</head>
<body class="flex items-center justify-center py-10">
  <div class="phone relative">
    <!-- soft ambient glow -->
    <div class="absolute -top-20 -left-10 w-60 h-60 rounded-full opacity-50" style="background: radial-gradient(circle,#a78bfa, transparent 60%);"></div>
    <div class="absolute top-40 -right-20 w-72 h-72 rounded-full opacity-40" style="background: radial-gradient(circle,#ec4899, transparent 60%);"></div>

    <!-- status bar -->
    <div class="relative flex justify-between items-center px-7 pt-3 pb-2 text-[12px] font-semibold text-white/90">
      <span>9:41</span>
      <span class="flex items-center gap-1.5">
        <span class="w-4 h-2.5 bg-white rounded-sm"></span>
        <span class="w-3 h-3 border-2 border-white rounded-full"></span>
        <span class="w-6 h-3 border border-white rounded-sm"></span>
      </span>
    </div>

    <!-- top app bar -->
    <div class="relative px-4 pt-2 pb-3 flex items-center justify-between">
      <button class="w-10 h-10 flat-card rounded-2xl grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="flex flex-col items-center">
        <span class="text-[10px] tracking-widest font-bold gradient-text">WKND42</span>
        <span class="pop text-[18px] text-white">Weekend Warriors</span>
      </div>
      <button class="w-10 h-10 flat-card rounded-2xl grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </button>
    </div>

    <!-- segmented tabs -->
    <div class="relative px-4 mb-3">
      <div class="flat-card rounded-2xl p-1 flex text-[12px] font-bold">
        <button class="flex-1 py-2 rounded-xl tab-active-grad text-white">Sync orbits</button>
        <button class="flex-1 py-2 rounded-xl text-slate-400">Crew schedule</button>
      </div>
    </div>

    <!-- scrollable content -->
    <div class="relative px-4 space-y-3 overflow-hidden" style="height: 540px;">
      <!-- hero stats with gradient glow -->
      <div class="glow-card rounded-3xl p-5 relative overflow-hidden">
        <div class="flex items-baseline justify-between">
          <div>
            <div class="text-[10px] uppercase tracking-widest font-bold gradient-text">Everyone free</div>
            <div class="pop text-3xl text-white mt-1">Sat 8–11pm</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] uppercase tracking-widest font-bold text-slate-400">Crew</div>
            <div class="pop text-2xl text-white">5<span class="text-slate-500">/5</span></div>
          </div>
        </div>
        <div class="mt-4 flex -space-x-2">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-pink-400 to-rose-500 ring-2 ring-[#1a1d2e] grid place-items-center text-[11px] font-bold text-white">A</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sky-400 to-blue-600 ring-2 ring-[#1a1d2e] grid place-items-center text-[11px] font-bold text-white">M</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-300 to-teal-500 ring-2 ring-[#1a1d2e] grid place-items-center text-[11px] font-bold text-white">J</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-300 to-orange-500 ring-2 ring-[#1a1d2e] grid place-items-center text-[11px] font-bold text-white">K</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-400 to-fuchsia-600 ring-2 ring-[#1a1d2e] grid place-items-center text-[11px] font-bold text-white">+1</div>
        </div>
      </div>

      <!-- heatmap card -->
      <div class="flat-card rounded-3xl p-5">
        <div class="flex items-center justify-between mb-3">
          <div class="pop text-[14px] text-white">This week</div>
          <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Jul 14 – Jul 20</span>
        </div>
        <div class="grid grid-cols-7 gap-1">
          <script>document.write(Array.from({length:56}).map(()=>{const palette=['#1a1d2e','#312e81','#4338ca','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899'];const c=palette[Math.floor(Math.random()*8)];return `<div class="heat" style="background:${c}"></div>`}).join(''))</script>
        </div>
      </div>

      <!-- next hangout with gradient pill -->
      <div class="rounded-3xl p-5 relative overflow-hidden" style="background: linear-gradient(135deg, rgba(167,139,250,.18), rgba(236,72,153,.18));border:1px solid rgba(236,72,153,.35);">
        <div class="text-[10px] uppercase tracking-widest font-bold gradient-text">Upcoming hangout</div>
        <div class="pop text-lg text-white mt-1">Pizza & Trivia 🍕</div>
        <div class="text-[12px] text-slate-400 mt-1">Saturday · 8:00–10:30pm · Brooklyn</div>
        <div class="mt-3 flex gap-2">
          <button class="accent-grad rounded-full px-3.5 py-1.5 text-[11px] font-bold text-white">Add to calendar</button>
          <button class="flat-card rounded-full px-3.5 py-1.5 text-[11px] font-bold text-slate-200">Share</button>
        </div>
      </div>
    </div>

    <!-- center astral mascot orb with pulse ring -->
    <div class="absolute left-1/2 -translate-x-1/2" style="bottom: 60px;">
      <div class="absolute inset-0 rounded-full pulse-ring" style="width:64px;height:64px;"></div>
      <div class="w-16 h-16 rounded-full grid place-items-center orb-mega relative">
        <div class="absolute inset-1 rounded-full" style="background: linear-gradient(135deg,#1e1b4b,#312e81);"></div>
        <svg width="34" height="34" viewBox="0 0 32 32" fill="none" class="relative">
          <rect x="6" y="9" width="20" height="16" rx="6" fill="rgba(255,255,255,.95)"/>
          <line x1="16" y1="4" x2="16" y2="9" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="3" r="1.8" fill="#f472b6"/>
          <circle cx="12" cy="16" r="1.8" fill="#7c3aed"/>
          <circle cx="20" cy="16" r="1.8" fill="#7c3aed"/>
          <path d="M12 20 Q16 22.5 20 20" stroke="#7c3aed" stroke-width="1.7" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

    <!-- bottom tab bar -->
    <div class="absolute left-0 right-0 bottom-0 px-4 pb-5 pt-2">
      <div class="flat-card rounded-3xl py-3 grid grid-cols-5">
        <button class="flex flex-col items-center gap-0.5">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="2" stroke-linecap="round">
            <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
            <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span class="text-[10px] font-bold gradient-text">Plan</span>
        </button>
        <button class="flex flex-col items-center gap-0.5 text-slate-500">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="7" r="3"/></svg>
          <span class="text-[10px] font-semibold">Crew</span>
        </button>
        <div></div>
        <button class="flex flex-col items-center gap-0.5 text-slate-500">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2 L2 8 L12 14 L22 8 Z"/><path d="M2 16 L12 22 L22 16"/></svg>
          <span class="text-[10px] font-semibold">Hangouts</span>
        </button>
        <button class="flex flex-col items-center gap-0.5 text-slate-500">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <span class="text-[10px] font-semibold">More</span>
        </button>
      </div>
    </div>

    <!-- label below orb -->
    <div class="absolute left-1/2 -translate-x-1/2 text-[10px] font-bold tracking-widest gradient-text" style="bottom: 32px;">ASTRAL</div>
  </div>

  <div class="absolute bottom-2 text-center w-full text-slate-400 font-semibold">Style C — Modern flat dark with vibrant gradient (lavender ↔ pink)</div>
</body>
</html>
